[profile.default]
src = "contracts"
test = "foundry-test"
out = "out"
cache_path = "cache_forge"
libs = ["node_modules"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
    "forge-std/=node_modules/forge-std/src/",
]

[invariant]
runs = 256
depth = 50
fail_on_revert = false
call_override = false

[fuzz]
runs = 256
