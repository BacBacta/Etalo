<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; width: 1200px; height: 630px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #FFF7ED 0%, #FED7AA 100%); display: flex; }
  .left { width: 540px; height: 630px; padding: 0; }
  .product-image { width: 540px; height: 630px; object-fit: cover; }
  .right { flex: 1; padding: 60px 56px; display: flex; flex-direction: column; justify-content: space-between; }
  .header { display: flex; justify-content: space-between; align-items: center; }
  .brand { background: #0F172A; color: #FED7AA; padding: 12px 24px; border-radius: 8px; font-size: 24px; font-weight: 600; }
  .handle { font-size: 22px; color: #0F172A; opacity: 0.7; }
  .body { margin: 0; }
  .title { font-size: 36px; font-weight: 600; color: #0F172A; margin: 0 0 16px; line-height: 1.2; }
  .price { font-size: 72px; font-weight: 700; color: #C2410C; margin: 0 0 24px; }
  .url { font-size: 22px; color: #0F172A; opacity: 0.7; margin: 0; }
  .cta-row { display: flex; align-items: center; justify-content: space-between; }
  .cta { background: #0F172A; color: #FED7AA; padding: 16px 36px; border-radius: 999px; font-size: 22px; font-weight: 600; }
  .qr { width: 100px; height: 100px; }
</style>
</head>
<body>
<div class="left">
  <img class="product-image" src="{{ product_image_url }}" alt="{{ title }}">
</div>
<div class="right">
  <div class="header">
    <span class="brand">etalo</span>
    <span class="handle">@{{ seller_handle }}</span>
  </div>
  <div class="body">
    <p class="title">{{ title }}</p>
    <p class="price">{{ price_usdt }} USDT</p>
    <p class="url">etalo.app/{{ seller_handle }}</p>
  </div>
  <div class="cta-row">
    <span class="cta">Buy with USDT escrow</span>
    <img class="qr" src="{{ qr_url }}" alt="Scan to buy">
  </div>
</div>
</body>
</html>
