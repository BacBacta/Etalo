<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1200px;
    height: 630px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #FFFFFF;
    color: #1A1A1A;
    -webkit-font-smoothing: antialiased;
    display: flex;
  }
  .left { width: 540px; height: 630px; padding: 40px; }
  .product-image {
    display: block;
    width: 460px;
    height: 550px;
    object-fit: cover;
    border-radius: 16px;
    filter:
      drop-shadow(0 24px 24px rgba(0,0,0,0.06))
      drop-shadow(0 8px 12px rgba(0,0,0,0.04));
  }
  .right {
    flex: 1;
    padding: 48px 56px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .header { display: flex; justify-content: space-between; align-items: center; }
  .brand { font-size: 26px; font-weight: 700; letter-spacing: -0.4px; color: #1A1A1A; }
  .handle { font-size: 20px; font-weight: 400; color: #6B6B6B; }
  .body-content { margin: 0; }
  .title { font-size: 36px; font-weight: 600; color: #1A1A1A; margin: 0 0 16px; line-height: 1.2; }
  .price { font-size: 72px; font-weight: 800; color: #1A1A1A; margin: 0 0 12px; letter-spacing: -1.5px; line-height: 1; }
  .price-unit { font-size: 32px; font-weight: 600; color: #6B6B6B; margin-left: 6px; }
  .escrow-tag {
    display: inline-block;
    font-size: 16px;
    font-weight: 500;
    color: #1F4D3F;
    background: #E8F0EC;
    padding: 8px 16px;
    border-radius: 999px;
  }
  .cta-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .cta {
    flex: 1;
    background: #1A1A1A;
    color: #FFFFFF;
    padding: 18px 28px;
    border-radius: 999px;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.2px;
  }
  .qr {
    width: 84px;
    height: 84px;
    border-radius: 10px;
    border: 1px solid #EDEDED;
    padding: 4px;
    background: white;
  }
</style>
</head>
<body>
<div class="left">
  <img class="product-image" src="{{ product_image_url }}" alt="{{ title }}">
</div>
<div class="right">
  <div class="header">
    <span class="brand">etalo</span>
    <span class="handle">@{{ seller_handle }}</span>
  </div>
  <div class="body-content">
    <p class="title">{{ title }}</p>
    <p class="price">{{ price_usdt }}<span class="price-unit">USDT</span></p>
    <span class="escrow-tag">✓ USDT escrow protected</span>
  </div>
  <div class="cta-row">
    <span class="cta">Buy with USDT escrow →</span>
    <img class="qr" src="{{ qr_url }}" alt="">
  </div>
</div>
</body>
</html>
