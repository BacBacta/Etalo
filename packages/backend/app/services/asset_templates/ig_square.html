<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1080px;
    height: 1080px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #FFFFFF;
    color: #1A1A1A;
    -webkit-font-smoothing: antialiased;
  }
  .header { padding: 32px 56px 0; display: flex; justify-content: space-between; align-items: center; }
  .brand { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: #1A1A1A; }
  .handle { font-size: 22px; font-weight: 400; color: #6B6B6B; }
  .product-image {
    display: block;
    width: 880px;
    height: 660px;
    margin: 28px auto 0;
    object-fit: cover;
    border-radius: 16px;
    filter:
      drop-shadow(0 32px 32px rgba(0,0,0,0.06))
      drop-shadow(0 8px 16px rgba(0,0,0,0.04));
  }
  .footer { position: absolute; bottom: 56px; left: 56px; right: 56px; }
  .info-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; }
  .title { font-size: 30px; font-weight: 600; color: #1A1A1A; margin: 0 0 6px; line-height: 1.2; max-width: 600px; }
  .price-line { font-size: 16px; color: #6B6B6B; font-weight: 500; }
  .price { font-size: 52px; font-weight: 800; color: #1A1A1A; letter-spacing: -1.5px; line-height: 1; margin: 0; }
  .price-unit { font-size: 22px; font-weight: 600; color: #6B6B6B; margin-left: 4px; }
  .cta-row { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
  .cta {
    flex: 1;
    background: #1A1A1A;
    color: #FFFFFF;
    padding: 22px 32px;
    border-radius: 999px;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.2px;
  }
  .qr {
    width: 96px;
    height: 96px;
    border-radius: 12px;
    border: 1px solid #EDEDED;
    padding: 6px;
    background: white;
  }
</style>
</head>
<body>
<div class="header">
  <span class="brand">etalo</span>
  <span class="handle">@{{ seller_handle }}</span>
</div>
<img class="product-image" src="{{ product_image_url }}" alt="{{ title }}">
<div class="footer">
  <div class="info-row">
    <div>
      <div class="price-line">From</div>
      <p class="price">{{ price_usdt }}<span class="price-unit">USDT</span></p>
    </div>
    <div style="text-align: right;">
      <p class="title">{{ title }}</p>
    </div>
  </div>
  <div class="cta-row">
    <span class="cta">Buy with USDT escrow →</span>
    <img class="qr" src="{{ qr_url }}" alt="">
  </div>
</div>
</body>
</html>
