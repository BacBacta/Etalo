<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; width: 1080px; height: 1080px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #FFF7ED 0%, #FED7AA 100%); }
  .header { background: #0F172A; color: #FED7AA; padding: 28px 48px; display: flex; justify-content: space-between; align-items: center; }
  .brand { font-size: 36px; font-weight: 600; letter-spacing: -0.5px; }
  .handle { font-size: 28px; opacity: 0.9; }
  .product-image { width: 880px; height: 660px; margin: 60px 100px 0; border-radius: 24px; object-fit: cover; box-shadow: 0 12px 40px rgba(0,0,0,0.15); }
  .footer { position: absolute; bottom: 60px; left: 60px; right: 60px; background: white; border-radius: 24px; padding: 32px 40px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
  .info { flex: 1; }
  .title { font-size: 36px; font-weight: 600; color: #0F172A; margin: 0 0 8px; line-height: 1.2; }
  .price { font-size: 56px; font-weight: 700; color: #C2410C; margin: 0; }
  .qr { width: 140px; height: 140px; }
</style>
</head>
<body>
<div class="header">
  <span class="brand">etalo</span>
  <span class="handle">@{{ seller_handle }}</span>
</div>
<img class="product-image" src="{{ product_image_url }}" alt="{{ title }}">
<div class="footer">
  <div class="info">
    <p class="title">{{ title }}</p>
    <p class="price">{{ price_usdt }} USDT</p>
  </div>
  <img class="qr" src="{{ qr_url }}" alt="Scan to buy">
</div>
</body>
</html>
