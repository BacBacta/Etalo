<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; width: 1080px; height: 1920px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(180deg, #ECFDF5 0%, #86EFAC 60%, #22C55E 100%); }
  .header { background: #065F46; color: #ECFDF5; padding: 36px 56px; display: flex; justify-content: space-between; align-items: center; }
  .brand { font-size: 44px; font-weight: 600; letter-spacing: -0.5px; }
  .handle { font-size: 32px; opacity: 0.9; }
  .product-image { width: 920px; height: 920px; margin: 80px 80px 0; border-radius: 32px; object-fit: cover; box-shadow: 0 16px 48px rgba(0,0,0,0.18); }
  .info { text-align: center; padding: 60px 80px 40px; }
  .title { font-size: 48px; font-weight: 600; color: #064E3B; margin: 0 0 24px; line-height: 1.2; }
  .price { font-size: 96px; font-weight: 700; color: #065F46; margin: 0 0 24px; }
  .url { font-size: 28px; color: #064E3B; margin: 0 0 40px; opacity: 0.85; }
  .cta { display: inline-block; background: #065F46; color: #ECFDF5; padding: 28px 64px; border-radius: 999px; font-size: 32px; font-weight: 600; }
</style>
</head>
<body>
<div class="header">
  <span class="brand">etalo</span>
  <span class="handle">@{{ seller_handle }}</span>
</div>
<img class="product-image" src="{{ product_image_url }}" alt="{{ title }}">
<div class="info">
  <p class="title">{{ title }}</p>
  <p class="price">{{ price_usdt }} USDT</p>
  <p class="url">etalo.app/{{ seller_handle }}</p>
  <span class="cta">Order on Etalo</span>
</div>
</body>
</html>
