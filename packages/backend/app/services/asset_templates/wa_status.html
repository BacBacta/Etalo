<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1080px;
    height: 1920px;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #FFFFFF;
    color: #1A1A1A;
    -webkit-font-smoothing: antialiased;
  }
  .header { padding: 56px 64px 0; display: flex; justify-content: space-between; align-items: center; }
  .brand { font-size: 36px; font-weight: 700; letter-spacing: -0.5px; color: #1A1A1A; }
  .handle { font-size: 28px; font-weight: 400; color: #6B6B6B; }
  .product-image {
    display: block;
    width: 920px;
    height: 920px;
    margin: 80px auto 0;
    object-fit: cover;
    border-radius: 24px;
    filter:
      drop-shadow(0 40px 40px rgba(0,0,0,0.07))
      drop-shadow(0 12px 20px rgba(0,0,0,0.04));
  }
  .info { padding: 100px 80px 0; text-align: center; }
  .title { font-size: 56px; font-weight: 600; color: #1A1A1A; margin: 0 0 32px; line-height: 1.15; }
  .price { font-size: 128px; font-weight: 800; color: #1A1A1A; letter-spacing: -3px; line-height: 1; margin: 0 0 12px; }
  .price-unit { font-size: 56px; font-weight: 600; color: #6B6B6B; margin-left: 8px; }
  .escrow-tag {
    display: inline-block;
    font-size: 22px;
    font-weight: 500;
    color: #1F4D3F;
    background: #E8F0EC;
    padding: 12px 24px;
    border-radius: 999px;
    margin-bottom: 56px;
  }
  .cta-wrapper { position: absolute; bottom: 100px; left: 80px; right: 80px; text-align: center; }
  .url-line {
    background: #1A1A1A;
    color: #FFFFFF;
    padding: 32px 48px;
    border-radius: 999px;
    font-size: 30px;
    font-weight: 600;
    letter-spacing: 0.3px;
    display: inline-block;
  }
  .tap-hint { font-size: 22px; color: #6B6B6B; margin-top: 24px; font-weight: 500; }
</style>
</head>
<body>
<div class="header">
  <span class="brand">etalo</span>
  <span class="handle">@{{ seller_handle }}</span>
</div>
<img class="product-image" src="{{ product_image_url }}" alt="{{ title }}">
<div class="info">
  <p class="title">{{ title }}</p>
  <p class="price">{{ price_usdt }}<span class="price-unit">USDT</span></p>
  <span class="escrow-tag">✓ USDT escrow protected</span>
</div>
<div class="cta-wrapper">
  <span class="url-line">{{ short_url | replace("https://", "") }} →</span>
  <p class="tap-hint">Tap the link to order on Etalo</p>
</div>
</body>
</html>
