<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; width: 1080px; height: 1920px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(180deg, #FFF7ED 0%, #FED7AA 60%, #FB923C 100%); }
  .header { background: #0F172A; color: #FED7AA; padding: 36px 56px; display: flex; justify-content: space-between; align-items: center; }
  .brand { font-size: 44px; font-weight: 600; letter-spacing: -0.5px; }
  .handle { font-size: 32px; opacity: 0.9; }
  .product-image { width: 920px; height: 920px; margin: 80px 80px 0; border-radius: 32px; object-fit: cover; box-shadow: 0 16px 48px rgba(0,0,0,0.18); }
  .info { text-align: center; padding: 60px 80px 40px; }
  .title { font-size: 48px; font-weight: 600; color: #0F172A; margin: 0 0 24px; line-height: 1.2; }
  .price { font-size: 96px; font-weight: 700; color: #C2410C; margin: 0 0 40px; }
  .cta { display: inline-block; background: #0F172A; color: #FED7AA; padding: 28px 64px; border-radius: 999px; font-size: 32px; font-weight: 600; }
  .qr-container { position: absolute; bottom: 80px; right: 80px; background: white; padding: 24px; border-radius: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .qr { width: 160px; height: 160px; display: block; }
</style>
</head>
<body>
<div class="header">
  <span class="brand">etalo</span>
  <span class="handle">@{{ seller_handle }}</span>
</div>
<img class="product-image" src="{{ product_image_url }}" alt="{{ title }}">
<div class="info">
  <p class="title">{{ title }}</p>
  <p class="price">{{ price_usdt }} USDT</p>
  <span class="cta">Buy with USDT</span>
</div>
<div class="qr-container">
  <img class="qr" src="{{ qr_url }}" alt="Scan to buy">
</div>
</body>
</html>
