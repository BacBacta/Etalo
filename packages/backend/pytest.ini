[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
markers =
    e2e: end-to-end tests requiring live Sepolia RPC + Postgres
    dormant_v1_5: tests for V1.5+ dormant features (marketing pack, address book, top seller, stake). Deselected by default ; opt-in with `pytest -m dormant_v1_5`. See docs/V1_5_DORMANT_CODE.md.
# Dormant V1.5+ tests are deselected by default to keep CI green ; they
# cover features that are committed but flag-gated off in V1 (ADR-049 /
# ADR-050 / ADR-041). Run them explicitly with `pytest -m dormant_v1_5`
# before reactivating any of those code paths.
addopts = -m "not dormant_v1_5"
# Make the project root (".") importable so `from tests.e2e.fixtures_data ...`
# resolves when running pytest from packages/backend/.
pythonpath = .
