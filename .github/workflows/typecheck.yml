name: Type check

# J10-V5 Phase 5 polish #4 — guard against the kind of latent TS error
# pile-up that bit us in Phase 4 sub-block 5.7. `next build` runs tsc
# only on files in the build graph, which excludes test files and any
# orphaned modules. Running `tsc --noEmit` on every push catches those
# blind spots before they accumulate.
#
# Scope is minimal on purpose : type check only, web package only.
# Lint + tests can be layered on in a follow-up workflow if Mike wants
# the broader CI surface ; this commit bootstraps the .github/workflows
# directory and locks in the rule that landed Phase 4's lesson.

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "packages/web/**"
      - ".github/workflows/typecheck.yml"
  pull_request:
    paths:
      - "packages/web/**"
      - ".github/workflows/typecheck.yml"

jobs:
  typecheck:
    name: tsc --noEmit (packages/web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
