name: Backend CI

# Backend safety net — runs the fast, self-contained pytest selection on
# every push / PR that touches the FastAPI backend. Added so escrow-
# adjacent backend logic (indexer handlers, the auto-refund / auto-release
# keepers, seller payout-ETA derivation) is regression-guarded in CI
# instead of relying on local runs only.
#
# Scope: `-m "not e2e and not dormant_v1_5"`. The e2e suite needs a live
# Sepolia RPC + Postgres (and Pinata) and is intentionally excluded here —
# this job is the deterministic, no-external-services tier (~5s, 80 tests).
# A DB-backed e2e job can be layered on later with a postgres service
# container if the unit tier proves insufficient.

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "packages/backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "packages/backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  pytest:
    name: pytest (unit — no e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: packages/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest (deselect e2e + dormant)
        # pytest.ini already deselects dormant_v1_5 via addopts ; we add
        # `not e2e` so the no-DB/no-RPC tier runs green without any
        # external service. Settings() has safe defaults for every field
        # (config.py), so no .env / secrets are needed for this tier.
        run: python -m pytest -m "not e2e and not dormant_v1_5" -q
