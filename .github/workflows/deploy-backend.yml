name: Deploy backend (Fly.io)

# Auto-deploy the FastAPI backend on `etalo-api.fly.dev` whenever a push
# to main touches `packages/backend/**`. Replaces the manual
# `flyctl deploy` workflow Mike had been running by hand after every PR
# merge that touched backend code.
#
# Setup (one-off, required for the workflow to actually deploy) :
#   1. Generate a Fly deploy token :
#        flyctl tokens create deploy --app etalo-api --expiry 8760h
#   2. Add it to the repo secrets :
#        gh secret set FLY_API_TOKEN --repo BacBacta/Etalo
#
# Token scope is intentionally narrow : deploy-only on the etalo-api
# app, ~1 year lifetime. Refresh annually (or shorter if a token leak
# becomes a concern).

on:
  push:
    branches: [main]
    paths:
      - "packages/backend/**"
      - ".github/workflows/deploy-backend.yml"
  # Lets us trigger manually from the GitHub Actions UI if a backend
  # deploy ever needs to run without a code change (e.g. secret rotation,
  # Fly platform incident recovery).
  workflow_dispatch:

# Cancel an in-flight backend deploy when a newer commit lands — only
# the latest main matters for prod, and overlapping flyctl deploys on
# the same app race for the Machine lease.
concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    name: flyctl deploy --app etalo-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --app etalo-api --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
