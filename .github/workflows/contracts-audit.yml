name: Contracts self-audit

# Dual-layer static analysis of the Etalo Solidity contracts on every
# PR / push that touches them — Slither for the deep semantic ruleset
# (reentrancy, uninitialized vars, shadowing, etc.) and Solhint for
# the style + best-practice surface (avoid-tx-origin, check-send-result,
# state-visibility). Aderyn (Cyfrin) was originally planned as a third
# second-opinion scanner but its install paths are all broken upstream
# as of 2026-05-24 (see the in-line note further down) — re-add when
# Cyfrin stabilises one of them.
#
# Layer 1 of the 4-layer self-audit stack documented in the Etalo
# audit plan : Static analysis (this) → Fuzzing + invariants (Foundry)
# → OpenZeppelin Open Source (Contracts lib + Monitor) → Pre-mainnet
# Pashov solidity-auditor skill.
#
# Each job blocks merge only on HIGH / MEDIUM findings. INFO / LOW /
# optimization noise is filtered at the tool config level so the
# signal stays high.

on:
  push:
    branches: [main]
    paths:
      - "packages/contracts/**"
      - ".github/workflows/contracts-audit.yml"
  pull_request:
    paths:
      - "packages/contracts/**"
      - ".github/workflows/contracts-audit.yml"

jobs:
  solhint:
    name: Solhint (style + security best practice)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Solhint
        run: npm install -g solhint@5

      - name: Lint contracts
        run: solhint 'contracts/*.sol' 'contracts/interfaces/*.sol'

  slither:
    name: Slither (Trail of Bits static analyser)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install contracts dependencies
        # Slither needs @openzeppelin/contracts + forge-std at the
        # paths declared in slither.config.json `solc_remaps`.
        run: npm install --no-audit --no-fund

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Slither + solc-select
        # solc-select pins the exact solc compiler version Slither
        # uses, bypassing both the broken Hardhat 3 toolbox
        # (`TypeError: this[#dependenciesMap].values(...).flatMap is
        # not a function`) and the Foundry install. solc 0.8.24
        # matches the contracts' pragma.
        env:
          # solc-select downloads solc binaries from the
          # ethereum/solc-bin GitHub release. Without GITHUB_TOKEN
          # the call hits the 60/hr unauthenticated rate limit on
          # the runner's shared IP and returns 403. The token is
          # auto-provided to every workflow run.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install slither-analyzer==0.10.4 solc-select==1.0.4
          solc-select install 0.8.24
          solc-select use 0.8.24

      - name: Run Slither
        # Pass the contracts dir explicitly so Slither uses solc
        # directly (no framework auto-detection → no forge / hardhat
        # invocation). `--solc-remaps` resolves @openzeppelin imports
        # from the npm-installed dependency.
        #
        # `--fail-medium` is cumulative (fails on HIGH + MEDIUM) ;
        # `--fail-high` is mutually exclusive with it, so we use the
        # broader flag. INFO / LOW / optimization filtered at config
        # level for noise.
        run: |
          slither contracts/ \
            --solc-remaps "@openzeppelin=node_modules/@openzeppelin" \
            --fail-medium

  # Aderyn (Cyfrin) was originally planned as a third static
  # analyser to complement Slither, but both upstream install paths
  # are broken as of 2026-05-24 :
  #
  # - The legacy `cyfrinup` install endpoint returns HTTP 404 (the
  #   Cyfrin team migrated off `raw.githubusercontent.com` without
  #   leaving a redirect).
  # - The GitHub-release tarball asset naming changed silently —
  #   the canonical `aderyn-x86_64-unknown-linux-gnu.tar.gz` URL
  #   returns a 14-byte HTML body that breaks `tar -xzf`.
  # - `cargo install aderyn --locked` fails to compile : a
  #   transitive dep (`svm-rs-builds`) generates duplicate
  #   `SOLC_VERSION_0_8_31` consts that error on rustc current.
  #
  # Slither (Trail of Bits) is the gold standard semantic analyser
  # and covers ~85 % of the patterns Aderyn would catch. Solhint
  # covers the style/best-practice surface. Together they're
  # sufficient for Layer 1 self-audit until Cyfrin stabilises one
  # of its install channels — at which point we re-add Aderyn as a
  # second-opinion job here.
