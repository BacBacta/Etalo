name: Contracts self-audit

# Dual-layer static analysis of the Etalo Solidity contracts on every
# PR / push that touches them — Slither for the deep semantic ruleset
# (reentrancy, uninitialized vars, shadowing, etc.) and Solhint for
# the style + best-practice surface (avoid-tx-origin, check-send-result,
# state-visibility). Aderyn (Cyfrin) was originally planned as a third
# second-opinion scanner but its install paths are all broken upstream
# as of 2026-05-24 (see the in-line note further down) — re-add when
# Cyfrin stabilises one of them.
#
# Layer 1 of the 4-layer self-audit stack documented in the Etalo
# audit plan : Static analysis (this) → Fuzzing + invariants (Foundry)
# → OpenZeppelin Open Source (Contracts lib + Monitor) → Pre-mainnet
# Pashov solidity-auditor skill.
#
# Each job blocks merge only on HIGH / MEDIUM findings. INFO / LOW /
# optimization noise is filtered at the tool config level so the
# signal stays high.

on:
  push:
    branches: [main]
    paths:
      - "packages/contracts/**"
      - ".github/workflows/contracts-audit.yml"
  pull_request:
    paths:
      - "packages/contracts/**"
      - ".github/workflows/contracts-audit.yml"

jobs:
  solhint:
    name: Solhint (style + security best practice)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Solhint
        run: npm install -g solhint@5

      - name: Lint contracts
        run: solhint 'contracts/*.sol' 'contracts/interfaces/*.sol'

  slither:
    name: Slither (Trail of Bits static analyser)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install contracts dependencies
        # Slither needs @openzeppelin/contracts + forge-std at the
        # paths declared in slither.config.json `solc_remaps`.
        run: npm install --no-audit --no-fund

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Slither
        run: pip install slither-analyzer==0.10.4

      - name: Install solc 0.8.24 from soliditylang.org CDN
        # `-f` makes curl exit non-zero on HTTP errors (without it the
        # 8th-iteration failed silently and left whatever system solc
        # was in PATH, which is 0.8.35 on the ubuntu-latest runner —
        # rejecting the contracts' `pragma 0.8.24`).
        run: |
          curl -fSL https://binaries.soliditylang.org/linux-amd64/solc-linux-amd64-v0.8.24+commit.e11b9ed9 \
            -o /usr/local/bin/solc
          chmod +x /usr/local/bin/solc
          # Sanity check : confirm we actually got 0.8.24, not some
          # stale binary that was already at that path.
          /usr/local/bin/solc --version | grep "0.8.24" || (echo "Wrong solc version" && exit 1)

      - name: Hide foundry.toml from crytic-compile
        # crytic-compile detects the build framework BEFORE applying
        # `--compile-force-framework`, so the override flag is useless
        # when foundry.toml sits at the working-directory root. By
        # moving the file out of the working dir for the duration of
        # the Slither run, crytic-compile falls through to standalone
        # solc compilation. We restore it in a cleanup step so any
        # subsequent action (artifact upload, etc.) sees the same
        # repo state.
        run: mv foundry.toml /tmp/etalo-foundry.toml.bak

      - name: Run Slither
        # With foundry.toml moved aside, crytic-compile compiles the
        # .sol files directly with the solc binary we installed above.
        # `--solc` is the explicit path so we never accidentally pick
        # the system's 0.8.35 (which rejects `pragma 0.8.24`).
        # `--solc-remaps` resolves @openzeppelin imports from the
        # npm-installed dependency.
        #
        # `--fail-medium` is cumulative (fails on HIGH + MEDIUM) ;
        # INFO / LOW / optimization are filtered at config level.
        run: |
          slither contracts/ \
            --solc /usr/local/bin/solc \
            --solc-remaps "@openzeppelin=node_modules/@openzeppelin" \
            --fail-medium

      - name: Restore foundry.toml
        if: always()
        run: mv /tmp/etalo-foundry.toml.bak foundry.toml

  forge-invariants:
    name: Foundry invariants (Layer 2)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install contracts dependencies
        # forge tests import @openzeppelin/contracts via the npm
        # path declared in foundry.toml `remappings`.
        run: npm install --no-audit --no-fund

      - name: Install Foundry
        # Pinning to a specific Foundry release tag (instead of
        # `stable` or `nightly`) skips the foundryup → GitHub API
        # `latest release` lookup that was hitting the runner's
        # 60-req/hour unauthenticated rate limit on earlier attempts.
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Foundry invariant tests
        # Etalo ships 824 LOC of invariant tests covering :
        # - EtaloEscrow : totalLocked == sum(orders.amount),
        #   commission ∈ [0, 1.8 %], item-status monotonic
        # - EtaloStake : slash ≤ deposited, sales reconciliation
        # - EtaloCredits : treasury == sum(credits) (ADR-024)
        # - Handler robustness : no unexpected reverts
        #
        # 256 runs × 15 depth (default Foundry invariant config) is
        # a reasonable balance for CI : ~ 2-3 min, catches the
        # obvious state-machine + accounting violations.
        run: forge test --match-path 'foundry-test/**/*.t.sol' -vv

  # Aderyn (Cyfrin) was originally planned as a third static
  # analyser to complement Slither, but both upstream install paths
  # are broken as of 2026-05-24 :
  #
  # - The legacy `cyfrinup` install endpoint returns HTTP 404 (the
  #   Cyfrin team migrated off `raw.githubusercontent.com` without
  #   leaving a redirect).
  # - The GitHub-release tarball asset naming changed silently —
  #   the canonical `aderyn-x86_64-unknown-linux-gnu.tar.gz` URL
  #   returns a 14-byte HTML body that breaks `tar -xzf`.
  # - `cargo install aderyn --locked` fails to compile : a
  #   transitive dep (`svm-rs-builds`) generates duplicate
  #   `SOLC_VERSION_0_8_31` consts that error on rustc current.
  #
  # Slither (Trail of Bits) is the gold standard semantic analyser
  # and covers ~85 % of the patterns Aderyn would catch. Solhint
  # covers the style/best-practice surface. Together they're
  # sufficient for Layer 1 self-audit until Cyfrin stabilises one
  # of its install channels — at which point we re-add Aderyn as a
  # second-opinion job here.
