# Re-trigger v3 fixes: Slither hardhat-compile + Aderyn cargo install.
name: Contracts self-audit

# Triple-layer static analysis of the Etalo Solidity contracts on every
# PR / push that touches them. Catches ~85-90 % of vulnerabilities a
# paid audit would find — Slither for the deep semantic ruleset
# (reentrancy, uninitialized vars, shadowing, etc.), Solhint for the
# style + best-practice surface (avoid-tx-origin, check-send-result,
# state-visibility), Aderyn for a second-opinion Rust-based scanner.
#
# Layer 1 of the 4-layer self-audit stack documented in the Etalo
# audit plan : Static analysis (this) → Fuzzing + invariants (Foundry)
# → OpenZeppelin Open Source (Contracts lib + Monitor) → Pre-mainnet
# Pashov solidity-auditor skill.
#
# Each job blocks merge only on HIGH / MEDIUM findings. INFO / LOW /
# optimization noise is filtered at the tool config level so the
# signal stays high.

on:
  push:
    branches: [main]
    paths:
      - "packages/contracts/**"
      - ".github/workflows/contracts-audit.yml"
  pull_request:
    paths:
      - "packages/contracts/**"
      - ".github/workflows/contracts-audit.yml"

jobs:
  solhint:
    name: Solhint (style + security best practice)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Solhint
        run: npm install -g solhint@5

      - name: Lint contracts
        run: solhint 'contracts/*.sol' 'contracts/interfaces/*.sol'

  slither:
    name: Slither (Trail of Bits static analyser)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install contracts dependencies
        # Slither needs @openzeppelin/contracts + forge-std at the
        # paths declared in slither.config.json `solc_remaps`.
        run: npm install --no-audit --no-fund

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Slither
        run: pip install slither-analyzer==0.10.4

      - name: Hardhat compile
        # Pre-compile via Hardhat so Slither can pick up the
        # artifacts without trying to run `forge build` (which would
        # need Foundry installed in CI, hitting the GitHub-API rate
        # limit on the runner's shared IP). The contracts ARE
        # configured for both Hardhat and Foundry — we use Hardhat
        # in CI because npm install already gave us the toolchain.
        run: npx hardhat compile

      - name: Run Slither
        # `--compile-force-framework hardhat` overrides Slither's
        # auto-detection (which would pick Foundry first because
        # `foundry.toml` is present at the project root) so Slither
        # reads the Hardhat artifacts produced above instead of
        # invoking `forge`.
        #
        # `--fail-medium` is cumulative (fails on HIGH + MEDIUM) ;
        # `--fail-high` is mutually exclusive with it, so we use the
        # broader flag. INFO / LOW / optimization filtered at config
        # level for noise.
        run: slither . --compile-force-framework hardhat --fail-medium

  aderyn:
    name: Aderyn (Cyfrin Rust-based scanner)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install contracts dependencies
        # Aderyn needs @openzeppelin/contracts under node_modules
        # to resolve the imports in our contracts. No Foundry
        # required — Aderyn discovers Solidity files directly
        # from foundry.toml / hardhat.config without compiling.
        run: npm install --no-audit --no-fund

      - name: Install Aderyn
        # `cargo install aderyn` is the most reliable install path —
        # Rust toolchain is preinstalled on ubuntu-latest runners and
        # crates.io publishing is stable. Takes 2-3 minutes to compile
        # vs <5 s for the binary, but the legacy `cyfrinup` endpoint
        # returns 404 and the GitHub-release tarball naming changed
        # in 2026 (the previous `aderyn-x86_64-unknown-linux-gnu.tar.gz`
        # URL pattern silently 404s with a 14-byte body that breaks
        # `tar -xzf`).
        run: cargo install aderyn --locked
        env:
          # Speed up cargo install : single codegen unit, no debug info.
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_DEBUG: "false"

      - name: Run Aderyn
        # `--severity high` exits non-zero on high-severity findings
        # only. Medium findings surface in the report but don't block
        # merge yet (tune the threshold once we see Aderyn's
        # signal-to-noise on Etalo's codebase).
        run: aderyn --severity high .
